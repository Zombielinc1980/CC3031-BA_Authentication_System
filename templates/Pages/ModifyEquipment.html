<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modify Rental</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
}

.container {
    width: 350px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
}

.total-box {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Modify Rental</h1>

    <h3>Current Selection:</h3>
    <p id="currentItem"></p>
    <p id="currentDays"></p>

    <hr>

    <label>Change Equipment:</label>
    <select id="equipment" onchange="updateTotal()">
        <option value="250">Excavator - $250/day</option>
        <option value="300">Bulldozer - $300/day</option>
        <option value="150">Forklift - $150/day</option>
        <option value="120">Scissor Lift - $120/day</option>
        <option value="90">Generator - $90/day</option>
        <option value="75">Air Compressor - $75/day</option>
        <option value="40">Chainsaw - $40/day</option>
        <option value="50">Lawn Mower - $50/day</option>
        <option value="60">Pressure Washer - $60/day</option>
        <option value="85">Cement Mixer - $85/day</option>
        <option value="30">Power Drill - $30/day</option>
        <option value="20">Ladder - $20/day</option>
    </select>

    <label>Change Days:</label>
    <input type="number" id="days" min="1" oninput="updateTotal()">

    <div class="total-box">
        New Total: $<span id="total">0.00</span>
    </div>

    <button onclick="saveChanges()">Save Changes</button>
</div>

<script>
// LOAD original data
window.onload = function() {
    let name = localStorage.getItem("equipmentName");
    let price = localStorage.getItem("equipmentPrice");
    let days = localStorage.getItem("rentalDays");

    if(name && days){
        document.getElementById("currentItem").innerText = "Item: " + name;
        document.getElementById("currentDays").innerText = "Days: " + days;

        document.getElementById("days").value = days;
    }

    updateTotal();
};

function updateTotal() {
    let price = parseFloat(document.getElementById("equipment").value);
    let days = parseInt(document.getElementById("days").value) || 0;
    let total = price * days;

    document.getElementById("total").textContent = total.toFixed(2);
}

function saveChanges() {
    let equipment = document.getElementById("equipment");
    let name = equipment.options[equipment.selectedIndex].text;
    let price = equipment.value;
    let days = document.getElementById("days").value;

    localStorage.setItem("equipmentName", name);
    localStorage.setItem("equipmentPrice", price);
    localStorage.setItem("rentalDays", days);

    alert("Rental Updated!");
}
</script>

</body>
</html>
