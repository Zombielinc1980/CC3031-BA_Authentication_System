<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../static/Register.css">
    <title>Equipment Rental Login</title>
</head>
<body>
    <div class="container">
        <h1>Rental Stuff LLC</h1>
        <h2>Login</h2>

        {% if errors %}
            <ul class="errors">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
            </ul>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">

            <label>Username:</label>
            <input type="text" id="username" name="username" value="{{ form_data.get('username', '') }}" required>

            <label>Password:</label>
            <input type="password" id="password" name="password" value="{{ form_data.get('password', '') }}" required>

            <input type="submit" value="Log In">
        </form>

        <div>
            <h3>
                Don't have an account? Register <a href="/register">here</a>.
            </h3>
        </div>
    </div>

</body>
</html>
