<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Rental Register</title>
    <link rel="stylesheet" href="/CC3031-BA_AUTHENTICATION_SYSTEM/templates/CSS/RentalList.css">
</head>
<body>

    <div class="Rentals">
        <h1>Rental Stuff LLC</h1>
        <h2>Register</h2>

        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="equipment">Choose Equipment:</label><br>
            <select id="equipment" name="equipment" onchange="calculateTotal()">
                <option value="250">Excavator - $250/day</option>
                <option value="300">Bulldozer - $300/day</option>
                <option value="150">Forklift - $150/day</option>
                <option value="120">Scissor Lift - $120/day</option>
                <option value="90">Generator - $90/day</option>
                <option value="75">Air Compressor - $75/day</option>
                <option value="40">Chainsaw - $40/day</option>
                <option value="50">Lawn Mower - $50/day</option>
                <option value="60">Pressure Washer - $60/day</option>
                <option value="85">Cement Mixer - $85/day</option>
                <option value="30">Power Drill - $30/day</option>
                <option value="20">Ladder - $20/day</option>
            </select><br><br>

            <label for="days">Rental Days:</label><br>
            <input type="number" id="days" name="days" min="1" oninput="calculateTotal()"><br><br>

            <div class="total-box">
                Total Cost: $<span id="total">0.00</span>
            </div>

            <input type="submit" value="Register Rental">
            <button onclick="window.location.href='ModifyEquipment.html'">Modify Rental</button>
        </form>
    </div>

    <script>
        function calculateTotal() {
            let equipmentPrice = parseFloat(document.getElementById("equipment").value);
            let rentalDays = parseInt(document.getElementById("days").value) || 0;
            let total = equipmentPrice * rentalDays;

            document.getElementById("total").textContent = total.toFixed(2);
        }
    </script>

</body>
</html>
