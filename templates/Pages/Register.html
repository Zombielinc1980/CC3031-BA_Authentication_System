<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CC3031-BA_AUTHENTICATION_SYSTEM/templates/CSS/Register.css">
    <title>Equipment Rental Register</title>

    

    <script>
        function validateForm() {
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>

    <div class="container">
        <h1>Rental Stuff LLC</h1>
        <h2>Register</h2>

        <form action="{{url_for('register')}}" method="post" onsubmit="return validateForm()">

            <label>First Name:</label>
            <input type="text" id="firstName" required>

            <label>Last Name:</label>
            <input type="text" id="lastName" required>

            <label>Email Address:</label>
            <input type="email" id="email" required>

            <label>Phone Number:</label>
            <input type="tel" id="phone" required>

            <label>Home Address:</label>
            <input type="text" id="address" required>

            <label>Driver License Number:</label>
            <input type="text" id="license" required>

            <label>Username:</label>
            <input type="text" id="username" required>

            <label>Password:</label>
            <input type="password" id="password" required>

            <label>Confirm Password:</label>
            <input type="password" id="confirmPassword" required>

            <input type="submit" value="Register">
        </form>
    </div>

</body>
</html>
