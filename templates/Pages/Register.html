<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Register.css">
    <title>Equipment Rental Register</title>
</head>
<body>

    <div class="container">
        <h1>Rental Stuff LLC</h1>
        <h2>Register</h2>

        <form action="{{ url_for('register') }}" method="POST">

            <label>First Name:</label>
            <input type="text" id="firstName" name="firstname" value="{{ form_data.get('firstname', '') }}" required>

            <label>Last Name:</label>
            <input type="text" id="lastName" name="lastname" value="{{ form_data.get('lastname', '') }}" required>

            <label>Username:</label>
            <input type="text" id="username" name="username" value="{{ form_data.get('username', '') }}" required>

            <label>Password:</label>
            <input type="password" id="password" name="password" value="{{ form_data.get('password', '') }}" required>

            <label>Confirm Password:</label>
            <input type="password" id="confirmpassword" name="confirmpassword" value="{{ form_data.get('confirmpassword', '') }}" required>

            <input type="submit" value="Register">
        </form>
    </div>

</body>
</html>
